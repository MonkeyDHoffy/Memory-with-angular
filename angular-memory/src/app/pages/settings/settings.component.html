<main class="settings-page">
    <header class="page-heading">
        <h1>Settings</h1>
        <span class="heading-line" aria-hidden="true"></span>
    </header>

    <section class="settings-cards" aria-label="Game settings">
        <section class="left-card">
            <section class="option-group" aria-label="Game themes">
                <h2>
                    <img src="/assets/settings/gamethemes.png" alt="" aria-hidden="true" />
                    Game themes
                </h2>

                <div class="option-list">
                    @for (theme of themeOptions; track theme.id) {
                    <label class="option-row option-row--theme" [class.is-selected]="selectedTheme() === theme.id">
                        <input type="radio" name="theme" [value]="theme.id" [checked]="selectedTheme() === theme.id"
                            (change)="chooseTheme(theme.id)" />
                        <span>{{ theme.label }}</span>
                    </label>
                    }
                </div>
            </section>

            <section class="option-group" aria-label="Choose player">
                <h2>
                    <img src="/assets/settings/chess_pawn.png" alt="" aria-hidden="true" />
                    Choose player
                </h2>

                <div class="option-list">
                    @for (player of playerOptions; track player.id) {
                    <label class="option-row" [class.is-selected]="selectedPlayer() === player.id">
                        <input type="radio" name="player" [value]="player.id" [checked]="selectedPlayer() === player.id"
                            (change)="choosePlayer(player.id)" />
                        <span>{{ player.label }}</span>
                    </label>
                    }
                </div>
            </section>

            <section class="option-group" aria-label="Board size">
                <h2>
                    <img src="/assets/settings/boardsize.png" alt="" aria-hidden="true" />
                    Board size
                </h2>

                <div class="option-list">
                    @for (size of boardSizeOptions; track size.id) {
                    <label class="option-row" [class.is-selected]="selectedBoardSize() === size.id">
                        <input type="radio" name="board-size" [value]="size.id"
                            [checked]="selectedBoardSize() === size.id" (change)="chooseBoardSize(size.id)" />
                        <span>{{ size.label }}</span>
                    </label>
                    }
                </div>
            </section>
        </section>

        <section class="right-card" aria-label="Theme preview">
            <div class="preview-frame">
                <img class="preview-image" [class.is-hidden]="!previewVisible()" [src]="selectedThemePreview()"
                    [alt]="selectedThemePreviewAlt()" />
            </div>

            <footer class="selection-summary" aria-label="Current selection summary">
                <span [class.is-placeholder]="themeSummary().isPlaceholder"
                    [class.is-selected]="!themeSummary().isPlaceholder">{{
                    themeSummary().label }}</span>
                <span class="divider" aria-hidden="true"></span>
                <span [class.is-placeholder]="playerSummary().isPlaceholder"
                    [class.is-selected]="!playerSummary().isPlaceholder">{{ playerSummary().label }}</span>
                <span class="divider" aria-hidden="true"></span>
                <span [class.is-placeholder]="boardSizeSummary().isPlaceholder"
                    [class.is-selected]="!boardSizeSummary().isPlaceholder">{{ boardSizeSummary().label }}</span>
                <button type="button" class="start-button" [disabled]="!canStartGame()"
                    [attr.aria-disabled]="!canStartGame()" [routerLink]="canStartGame() ? '/game' : null"
                    [queryParams]="gameQueryParams()" aria-label="Start game">
                    <img src="/assets/settings/small button.png" alt="Start" />
                </button>
            </footer>
        </section>
    </section>
</main>

<app-footer />
